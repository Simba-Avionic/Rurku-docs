# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "pl-PL"

reviews:
  profile: "chill"

  # --- Ograniczenie gabarytów i spamu z komentarzy ---
  high_level_summary: false        # Wyłącza sekcję High-level summary oraz Walkthrough
  walkthrough: false               # Wyłącza szczegółową tabelkę zmian
  poem: false                      # Wyłącza wierszyki/podsumowania ozdobne (jeśli były włączone)
  
  # Wyłącza wysyłanie komentarza podsumowującego, jeśli CodeRabbit nie ma żadnych uwag (no actionable comments)
  auto_review:
    enabled: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "draft"

  # --- Wyłączenie Pre-Merge Checks ---
  pre_merge_checks:
    enabled: false

  # --- Filtry ścieżek (Twoje istniejące reguły) ---
  path_filters:
    - "!**/build/**"
    - "!**/release/**"
    - "!**/diff_release/**"
    - "!**/*-difforigin/**"
    - "!**/*.aux"
    - "!**/*.log"
    - "!**/*.out"
    - "!**/*.toc"
    - "!**/*.fls"
    - "!**/*.fdb_latexmk"
    - "!**/*.synctex.gz"

  # --- Instrukcje dla ścieżek (Twoje istniejące reguły) ---
  path_instructions:
    - path: "**/*.tex"
      instructions: |
        To dokumentacja systems-engineering (LaTeX) projektu Rurku.
        Skup się na: spójności wymagań/ID, śledzeniu (traceability),
        jasności dla inżynierów, brakujących odwołaniach między SRD/CONOPS/SAD/TPTR/ICD,
        oraz na tym czy `\todo{}` nie maskuje krytycznych luk w zmienianych sekcjach.
        Nie nitpickuj drobnych kwestii stylu LaTeX, chyba że psują build albo czytelność.
    - path: "**/{Makefile,*.yml,*.yaml}"
      instructions: |
        Sprawdź poprawność ścieżek, pinowanie obrazów CI oraz czy cele Make
        i workflowy GitHub Actions są spójne między dokumentami.

# --- Wyłączenie wadliwych / niepotrzebnych narzędzi ---
tools:
  checkov:
    enabled: false