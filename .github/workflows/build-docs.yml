name: Build documentation

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  pull-requests: write
  contents: read
  packages: read

jobs:
  build:
    if: contains(github.event.pull_request.labels.*.name, 'build')
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/simba-avionic/simba_avionics_dockers/latex:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Install git and latexdiff
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git latexdiff ca-certificates

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --no-tags origin "${{ github.base_ref }}"

      - name: Build diff PDFs
        run: make diff DIFF_REF="origin/${{ github.base_ref }}"

      - name: Upload diff PDFs
        uses: actions/upload-artifact@v7
        with:
          name: docs-diff-pdfs
          path: diff_release/*.pdf
          if-no-files-found: error
          retention-days: 7
      - name: Komentarz z bezpośrednim linkiem
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🚀 **Pobierz artefakt bezpośrednio:**
            [Pobierz docs-diff-pdfs.zip](https://nightly.link/${{ github.repository }}/actions/runs/${{ github.run_id }}/docs-diff-pdfs.zip)