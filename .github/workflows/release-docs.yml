name: Release documentation

on:
  push:
    tags:
      # Wzorce glob w GH Actions: dopasuje v1.0, v2.15 itp.
      - "v[0-9]*.[0-9]*"

permissions:
  contents: write
  packages: read

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/simba-avionic/simba_avionics_dockers/latex
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      VERSION: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate tag format (vMAJOR.MINOR)
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must be vMAJOR.MINOR (e.g. v1.0 or v1.1), got: $VERSION"
            exit 1
          fi

      - name: Build all PDFs
        run: |
          make release VERSION=${{ env.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Documentation ${{ env.VERSION }}
          files: |
            release/*.pdf
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
