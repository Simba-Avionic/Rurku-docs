name: Release documentation

on:
  push:
    tags:
      # Wzorce glob w GH Actions: dopasuje v1.0, v2.15 itp.
      - "v[0-9]*.[0-9]*"

permissions:
  contents: write
  packages: read

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/simba-avionic/simba_avionics_dockers/latex
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      VERSION: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag format (vMAJOR.MINOR)
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must be vMAJOR.MINOR (e.g. v1.0 or v1.1), got: $VERSION"
            exit 1
          fi

      - name: Build all PDFs
        run: |
          (cd 1_SRD && make)
          (cd 2_CONOPS && make)
          (cd 4_TPTR && make)

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp 1_SRD/Rurku_SRD.pdf       "release/Rurku_SRD_${VERSION}.pdf"
          cp 2_CONOPS/Rurku_CONOPS.pdf "release/Rurku_CONOPS_${VERSION}.pdf"
          cp 4_TPTR/Rurku_TPTR.pdf     "release/Rurku_TPTR_${VERSION}.pdf"
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Documentation ${{ env.VERSION }}
          body: |
            Automated documentation build for tag `${{ env.VERSION }}`.

            Assets:
            - `Rurku_SRD_${{ env.VERSION }}.pdf`
            - `Rurku_CONOPS_${{ env.VERSION }}.pdf`
            - `Rurku_TPTR_${{ env.VERSION }}.pdf`
          files: |
            release/*.pdf
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
